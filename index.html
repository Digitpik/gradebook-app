<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradebook Portal</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 480px;
        }
        h2 {
            color: #0073e6;
            margin-top: 0;
            border-bottom: 2px solid #f0f4f8;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #dcdfe6;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus {
            border-color: #0073e6;
            outline: none;
        }
        button {
            width: 100%;
            background-color: #0073e6;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #005bb8;
        }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            border-radius: 6px;
            background-color: #f8fafc;
            border-left: 5px solid #0073e6;
            display: none;
            font-size: 15px;
            line-height: 1.5;
            color: #2c3e50;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Gradebook Dashboard</h2>
    
    <div class="form-group">
        <label for="classScores">Class Scores (separated by commas):</label>
        <input type="text" id="classScores" value="92, 88, 12, 77, 57, 100, 67, 38, 97, 89">
    </div>

    <div class="form-group">
        <label for="studentScore">Individual Student Score:</label>
        <input type="number" id="studentScore" value="37" min="0" max="100">
    </div>

    <button onclick="processGradebook()">Analyze Performance</button>

    <div id="result" class="result-box"></div>
</div>

<script src="gradebook.js"></script>

<script>
    // Frontend connector function to grab inputs and drive the UI
    function processGradebook() {
        const scoresInput = document.getElementById('classScores').value;
        const studentScoreInput = parseInt(document.getElementById('studentScore').value);
        const resultDiv = document.getElementById('result');

        // Convert the comma-separated string input into an array of actual numbers
        const scoresArray = scoresInput.split(',').map(num => parseFloat(num.trim())).filter(num => !isNaN(num));

        if (scoresArray.length === 0 || isNaN(studentScoreInput)) {
            resultDiv.style.display = "block";
            resultDiv.style.style.borderLeftColor = "#e6a23c";
            resultDiv.innerHTML = "<strong>Error:</strong> Please enter valid numerical scores.";
            return;
        }

        // Call the functional logic from your gradebook.js file!
        const finalMessage = studentMsg(scoresArray, studentScoreInput);

        // Display the results neatly on screen
        resultDiv.style.display = "block";
        resultDiv.innerHTML = `<strong>Analysis Complete:</strong><br>${finalMessage}`;
    }
</script>

</body>
</html>
